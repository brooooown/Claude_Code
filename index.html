<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iOS App Prototype</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    }

    h1 {
      color: white;
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 20px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 1.1rem;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .icon {
      width: 24px;
      height: 24px;
    }

    .features {
      margin-top: 30px;
      text-align: left;
    }

    .feature {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feature::before {
      content: "✨";
      font-size: 1rem;
    }

    @media (max-width: 480px) {
      .container {
        margin: 20px;
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>iOS App Prototype</h1>
    <p>iOS風のアプリプロトタイプを実装したWebアプリケーション<br>リキッドグラス・デザインとマルチスクリーン設計</p>

    <a href="./mirai-navi/" class="btn">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      プロトタイプを開く
    </a>

    <div class="features">
      <div class="feature">ガラスモーフィズム効果</div>
      <div class="feature">マルチスクリーン設計</div>
      <div class="feature">ハプティックフィードバック</div>
      <div class="feature">レスポンシブ対応</div>
    </div>
  </div>

  <script>
    // パスワード認証のプリロード
    if (sessionStorage.getItem('auth_05') !== '1') {
      const pass = prompt('パスワードを入力してください (ヒント: mirai)');
      if (pass !== 'mirai') {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#fff;background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);">認証に失敗しました</div>';
      } else {
        sessionStorage.setItem('auth_05', '1');
      }
    }

    // ボタンクリック時のフィードバック
    document.querySelector('.btn').addEventListener('click', function(e) {
      this.style.transform = 'translateY(-4px)';
      setTimeout(() => {
        this.style.transform = 'translateY(-2px)';
      }, 150);
    });
  </script>
</body>
</html>
