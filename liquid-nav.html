<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Bottom Navigation</title>
    <link rel="stylesheet" href="liquid-nav.css">
</head>
<body>
    <div class="app-container">
        <!-- メインコンテンツエリア -->
        <main class="content">
            <div class="content-inner">
                <h1>Liquid Glass Navigation</h1>
                <p>iOSスタイルのリキッドグラス・ボトムナビゲーション</p>
                <div class="demo-content">
                    <div class="card">
                        <h2>プロトタイプデモ</h2>
                        <p>下部のナビゲーションをタップして動作を確認できます</p>
                        <div class="current-tab">
                            <strong>現在のタブ:</strong> <span id="current-tab-name">ホーム</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- ボトムナビゲーション -->
        <nav class="bottom-nav">
            <div class="nav-container">
                <div class="nav-background"></div>
                <div class="nav-items">
                    <button class="nav-item active" data-tab="home">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 3L4 9v10c0 1.1.9 2 2 2h4v-7h4v7h4c1.1 0 2-.9 2-2V9l-8-6z"/>
                            </svg>
                        </div>
                        <span class="nav-label">ホーム</span>
                        <div class="nav-ripple"></div>
                    </button>

                    <button class="nav-item" data-tab="auction">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M4.34 2.93L6.88 1.12C7.25.85 7.75.85 8.12 1.12l2.54 1.81c.18.13.29.33.29.56v.44L12 4.5l1.05-.57v-.44c0-.23.11-.43.29-.56l2.54-1.81c.37-.27.87-.27 1.24 0l2.54 1.81c.18.13.29.33.29.56V6c0 .55-.45 1-1 1h-1v1c0 .55-.45 1-1 1H7c-.55 0-1-.45-1-1V7H5c-.55 0-1-.45-1-1V3.49c0-.23.11-.43.29-.56.05-.03.05-.03.05 0z"/>
                                <path d="M7 10h10l-2 8H9l-2-8z"/>
                                <circle cx="12" cy="21" r="1"/>
                            </svg>
                        </div>
                        <span class="nav-label">オークション</span>
                        <div class="nav-ripple"></div>
                    </button>

                    <button class="nav-item center-item" data-tab="sell">
                        <div class="nav-icon center-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 1C9.38 1 7.25 3.13 7.25 5.75c0 1.33.54 2.53 1.41 3.4L8 10v6c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2v-6l-.66-.85c.87-.87 1.41-2.07 1.41-3.4C16.75 3.13 14.62 1 12 1zM12 2.5c1.79 0 3.25 1.46 3.25 3.25S13.79 9 12 9s-3.25-1.46-3.25-3.25S10.21 2.5 12 2.5z"/>
                                <circle cx="12" cy="5.75" r="1.5"/>
                                <path d="M8 18c0 2.21 1.79 4 4 4s4-1.79 4-4v1c0 1.1-.9 2-2 2h-4c-1.1 0-2-.9-2-2v-1z"/>
                            </svg>
                        </div>
                        <span class="nav-label">出品</span>
                        <div class="nav-ripple center-ripple"></div>
                    </button>

                    <button class="nav-item" data-tab="wallet">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M21 7V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-2h-7c-1.66 0-3-1.34-3-3v-4c0-1.66 1.34-3 3-3h7z"/>
                                <path d="M14 9h8v6h-8c-1.1 0-2-.9-2-2v-2c0-1.1.9-2 2-2z"/>
                                <circle cx="18" cy="12" r="1.5"/>
                            </svg>
                        </div>
                        <span class="nav-label">おサイフ</span>
                        <div class="nav-ripple"></div>
                    </button>

                    <button class="nav-item" data-tab="search">
                        <div class="nav-icon">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                            </svg>
                        </div>
                        <span class="nav-label">検索</span>
                        <div class="nav-ripple"></div>
                    </button>
                </div>
            </div>
        </nav>
    </div>

    <script src="liquid-nav.js"></script>
</body>
</html>
